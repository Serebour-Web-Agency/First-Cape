<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Connection Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5; }
    .box { background: white; padding: 30px; border-radius: 8px; max-width: 800px; margin: 0 auto; }
    .success { color: #10b981; font-size: 20px; font-weight: bold; }
    .error { color: #ef4444; font-size: 20px; font-weight: bold; }
    pre { background: #1f2937; color: #10b981; padding: 15px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>

<div class="box">
  <h1>🔍 Worker Connection Test</h1>
  <p>Testing direct connection to Cloudflare Worker...</p>
  <hr>
  <div id="result">Testing...</div>
</div>

<script>
// Test Worker connection
async function testWorker() {
  const resultDiv = document.getElementById('result');
  
  try {
    console.log('Testing Worker...');
    
    const workerUrl = 'https://icy-cherry-d39b.fragrant-sea-e1f1.workers.dev/properties';
    
    resultDiv.innerHTML = '<p>Calling: ' + workerUrl + '</p>';
    
    const response = await fetch(workerUrl);
    
    if (!response.ok) {
      throw new Error('Worker returned ' + response.status);
    }
    
    const data = await response.json();
    
    resultDiv.innerHTML = `
      <p class="success">✅ SUCCESS! Worker is responding!</p>
      <h3>Response:</h3>
      <pre>${JSON.stringify(data, null, 2)}</pre>
      <hr>
      <p><strong>Records found:</strong> ${data.records ? data.records.length : 0}</p>
      <p><strong>This means:</strong></p>
      <ul>
        <li>✅ Worker is working</li>
        <li>✅ Airtable connection is working</li>
        <li>✅ Data is loading correctly</li>
        <li>❌ CSP is the problem on other pages!</li>
      </ul>
    `;
    
  } catch (error) {
    resultDiv.innerHTML = `
      <p class="error">❌ ERROR!</p>
      <p><strong>Error message:</strong> ${error.message}</p>
      <hr>
      <p><strong>This could mean:</strong></p>
      <ul>
        <li>Worker is not accessible</li>
        <li>CSP is blocking the request</li>
        <li>Network issue</li>
      </ul>
      <p><strong>Check browser console (F12) for more details.</strong></p>
    `;
    console.error('Test failed:', error);
  }
}

// Run test on page load
testWorker();
</script>

</body>
</html>
